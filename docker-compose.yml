---
services:
  docker-linux-server-ubuntu-fips:
    image: gabemendoza1/docker-linuxserver-ubuntu-fips:${VERSION:-jammy-22.04}
    build:
      context: .
      dockerfile: Dockerfile
      target: ubuntu-fips-base-python
      platforms:
        - linux/amd64
      args:
        - VERSION=${VERSION:-jammy-22.04}
        - S6_OVERLAY_VERSION=${S6_OVERLAY_VERSION:-3.1.6.2}
        - S6_OVERLAY_ARCH=${S6_OVERLAY_ARCH:-x86_64}
        - MODS_VERSION=${MODS_VERSION:-v3}
        - PKG_INST_VERSION=${PKG_INST_VERSION:-v1}
        - LSIOWN_VERSION=${LSIOWN_VERSION:-v1}
        - REL=${REL:-jammy}
        - ARCH=${ARCH:-amd64}
        - ECR_ACCOUNT_ID=${ECR_ACCOUNT_ID}
        - ECR_REGION=${ECR_REGION:-us-east-1}
        - BASE_IMAGE_NAME=${BASE_IMAGE_NAME}
        - BASE_IMAGE_TAG=${BASE_IMAGE_TAG:-22.04}

